name: terraform

# Validation, native tests, and lint for the Athena security data lake. No AWS
# credentials required — fmt/validate are static and the native tests use mock
# providers, so this runs on every PR for free and creates nothing.
# (Security scanning lives in the separate trivy.yml / trufflehog.yml workflows.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.15.7"

jobs:
  validate:
    name: fmt • validate • test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform test (s3 module)
        working-directory: modules/s3
        run: |
          terraform init -backend=false -input=false
          terraform test -no-color

      - name: terraform test (waf module)
        working-directory: modules/waf
        run: |
          terraform init -backend=false -input=false
          terraform test -no-color

  lint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init
      - run: tflint --recursive --no-color

  lambda:
    name: lambda (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile the dashboard Lambda
        run: |
          python -m compileall -q dashboard/lambda
