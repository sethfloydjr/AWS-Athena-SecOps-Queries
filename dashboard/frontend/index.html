<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Security Dashboard — Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { text-align: center; }
        .login-box h1 { font-size: 24px; color: #f0f6fc; margin-bottom: 16px; }
        .login-box p { color: #8b949e; margin-bottom: 24px; }
        .btn { padding: 12px 32px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; }
        .btn-login { background: #1f6feb; color: #fff; }
        .btn-login:hover { background: #388bfd; }
        .error { color: #f85149; margin-top: 16px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Athena Security Dashboard</h1>
        <p>Sign in with Okta to access security queries</p>
        <button class="btn btn-login" id="login-btn">Sign in with Okta</button>
        <div id="error"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
