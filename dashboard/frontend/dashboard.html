<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Security Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 300px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 16px; flex-shrink: 0; }
        .sidebar h2 { color: #58a6ff; font-size: 14px; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar h2:first-child { margin-top: 0; }
        .query-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 2px 0; word-break: break-word; display: flex; justify-content: space-between; align-items: center; }
        .query-item:hover { background: #21262d; }
        .query-item.active { background: #1f6feb; color: #fff; }
        .query-count { color: #8b949e; font-size: 11px; margin-left: 4px; }
        .search-box { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
        .search-box:focus { outline: none; border-color: #58a6ff; }
        .search-cat-label { color: #8b949e; font-size: 11px; margin-left: 8px; }
        .delete-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1; }
        .delete-btn:hover { color: #f85149; }
        .guide-link { color: #58a6ff; font-size: 12px; cursor: pointer; text-decoration: none; margin-left: 8px; }
        .guide-link:hover { text-decoration: underline; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 16px 24px; border-bottom: 1px solid #30363d; }
        .header h1 { font-size: 20px; color: #f0f6fc; }
        .user-info { color: #8b949e; font-size: 13px; margin-top: 4px; }
        .user-info a { color: #58a6ff; cursor: pointer; text-decoration: none; }

        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 24px; }
        .query-name { font-size: 18px; color: #f0f6fc; margin-bottom: 4px; }
        .query-desc { color: #8b949e; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
        .params { margin-bottom: 16px; }
        .param-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .param-row label { font-size: 13px; color: #8b949e; min-width: 200px; }
        .param-row input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 6px; flex: 1; font-size: 13px; }
        .sql-editor { width: 100%; min-height: 200px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; padding: 12px; border-radius: 6px; resize: vertical; line-height: 1.5; }
        .controls { display: flex; gap: 12px; margin: 16px 0; align-items: center; flex-wrap: wrap; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-run { background: #238636; color: #fff; }
        .btn-run:hover { background: #2ea043; }
        .btn-run:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .btn-stop { background: #da3633; color: #fff; }
        .btn-save { background: #1f6feb; color: #fff; }
        .btn-save:hover { background: #388bfd; }
        .btn-csv { background: #30363d; color: #c9d1d9; }
        .btn-csv:hover { background: #3b434b; }
        .status { display: flex; gap: 16px; align-items: center; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-running { background: #1f6feb33; color: #58a6ff; }
        .status-succeeded { background: #23863633; color: #3fb950; }
        .status-failed { background: #da363333; color: #f85149; }
        .stats { color: #8b949e; font-size: 12px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top: 2px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results-container { margin-top: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #161b22; color: #8b949e; text-align: left; padding: 8px 12px; border: 1px solid #30363d; position: sticky; top: 0; white-space: nowrap; }
        td { padding: 6px 12px; border: 1px solid #21262d; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        td:hover { white-space: normal; word-break: break-all; }
        tr:hover td { background: #161b22; }
        .pagination { margin-top: 12px; display: flex; gap: 12px; align-items: center; }
        .row-count { color: #8b949e; font-size: 12px; }
        .empty-state { text-align: center; padding: 80px 24px; color: #484f58; }
        .empty-state h2 { font-size: 24px; margin-bottom: 8px; color: #8b949e; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; width: 500px; max-width: 90vw; }
        .modal h3 { color: #f0f6fc; margin-bottom: 16px; }
        .modal label { display: block; color: #8b949e; font-size: 13px; margin-bottom: 4px; margin-top: 12px; }
        .modal input, .modal textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
        .modal textarea { min-height: 60px; resize: vertical; font-family: inherit; }
        .modal .warning { background: #da363320; border: 1px solid #da363355; color: #f0883e; padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-top: 16px; line-height: 1.5; }
        .modal .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; }
        .modal .btn-cancel { background: #30363d; color: #c9d1d9; }
        .guide-modal { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px; width: 800px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
        .guide-modal h2 { color: #f0f6fc; margin: 24px 0 12px; font-size: 18px; }
        .guide-modal h2:first-child { margin-top: 0; }
        .guide-modal h3 { color: #58a6ff; margin: 20px 0 8px; font-size: 15px; }
        .guide-modal p { line-height: 1.6; margin-bottom: 8px; }
        .guide-modal strong { color: #f0f6fc; }
        .guide-modal ul { margin: 8px 0 8px 20px; }
        .guide-modal li { margin: 4px 0; line-height: 1.5; }
        .guide-modal code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', monospace; font-size: 12px; }
        .guide-modal pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0 16px; }
        .guide-modal pre code { padding: 0; background: none; }
        .guide-modal table { width: 100%; border-collapse: collapse; margin: 8px 0 16px; }
        .guide-modal table th, .guide-modal table td { padding: 6px 10px; border: 1px solid #30363d; font-size: 12px; }
        .guide-modal table th { background: #0d1117; color: #8b949e; }
        .guide-modal hr { border: none; border-top: 1px solid #30363d; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar"><h2>Loading queries...</h2></div>
    <div class="main">
        <div class="header">
            <div>
                <h1>Athena Security Dashboard</h1>
                <div class="user-info">
                    <span id="user-email"></span> | <a id="logout-link">Sign out</a>
                </div>
            </div>
        </div>
        <div class="content" id="content">
            <div class="empty-state">
                <h2>Select a query</h2>
                <p>Choose a query from the sidebar to get started</p>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
